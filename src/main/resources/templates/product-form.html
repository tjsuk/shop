<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Product</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-4">

<h1 th:text="${product.id == null} ? 'Create Product' : 'Edit Product'">

    Create Product

</h1>

<form th:action="@{/web/products}"

      th:object="${product}"

      method="post">

    <!-- Hidden ID field required for UPDATE support -->

    <input type="hidden"
           th:field="*{id}">

    <div class="mb-3">

        <label class="form-label">

            Name

        </label>

        <input type="text"

               th:field="*{name}"

               class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">

            Price

        </label>

        <input type="number"

               step="0.01"

               th:field="*{price}"

               class="form-control">

    </div>

    <button type="submit"

            class="btn btn-primary">

        <span th:text="${product.id == null} ? 'Save Product' : 'Update Product'">

            Save Product

        </span>

    </button>

    <a th:href="@{/web/products}"

       class="btn btn-secondary">

        Cancel

    </a>

</form>

</body>
</html>
