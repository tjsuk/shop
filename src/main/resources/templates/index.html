<!DOCTYPE html>

<!--
    Root HTML document.

    Declares the document type as HTML5.
-->
<html lang="en">

<head>

    <!--
        Character encoding.

        UTF-8 supports most international characters.
    -->
    <meta charset="UTF-8">

    <!--
        Browser tab title.
    -->
    <title>Shop Application</title>

    <!--
        Bootstrap CSS framework.

        Loaded from a CDN (Content Delivery Network).

        Bootstrap provides:
        - responsive layouts
        - buttons
        - typography
        - spacing utilities
        - tables
        - forms
        - navigation components
    -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<!--
    Bootstrap utility classes:

    container
        Creates a responsive page container.

    mt-5
        Adds top margin spacing.
-->
<body class="container mt-5">

<!--
    Main page content wrapper.

    text-center aligns all child text centrally.
-->
<div class="text-center">

    <!--
        Main application heading.
    -->
    <h1>Shop REST API & MVC Demo</h1>

    <!--
        Lead paragraph styling provided by Bootstrap.

        lead
            Larger introductory text.

        mt-3
            Adds top spacing.
    -->
    <p class="lead mt-3">

        Demonstration project using Spring Boot,
        REST APIs and Thymeleaf.

    </p>

    <!--
        Hyperlink styled as a Bootstrap button.

        href
            Navigates to the product list page.

        btn
            Base Bootstrap button styling.

        btn-primary
            Blue primary button style.

        btn-lg
            Large button size.

        mt-3
            Adds spacing above the button.
    -->
    <a href="/web/products"
       class="btn btn-primary btn-lg mt-3">

        View Products

    </a>

</div>

</body>
</html>
